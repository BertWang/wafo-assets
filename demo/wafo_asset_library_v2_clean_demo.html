<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>WAFO Asset Library Demo</title>
  <style>
    :root{--wafo-brown:#37200D;--wafo-gold:#B88A44;--wafo-cream:#FFF8EC;--wafo-card:#FFFDF7;}
    *{box-sizing:border-box}
    body{margin:0;background:var(--wafo-cream);color:var(--wafo-brown);font-family:system-ui,-apple-system,BlinkMacSystemFont,"Noto Sans TC","Microsoft JhengHei",sans-serif;}
    .wrap{max-width:1200px;margin:0 auto;padding:32px 18px 64px;}
    .hero{padding:26px 22px;border:1px solid rgba(184,138,68,.25);border-radius:28px;background:linear-gradient(135deg,#fffaf0,#fff4dd);box-shadow:0 16px 38px rgba(55,32,13,.08);}
    h1{margin:0 0 8px;font-size:30px;letter-spacing:.02em}.lead{margin:0;color:#745b39;line-height:1.7}.toolbar{display:flex;gap:10px;flex-wrap:wrap;margin-top:18px}.pill{border:1px solid rgba(184,138,68,.35);background:#fff;border-radius:999px;padding:8px 13px;color:#6e5435;text-decoration:none;font-size:13px;font-weight:700;cursor:pointer}.pill:hover{background:#fff8ec}.status{margin-top:14px;color:#8a6b3f;font-size:13px}.cat{margin-top:32px}.cat h2{font-size:22px;margin:0 0 14px}.cat small{font-size:13px;color:#8a6b3f;font-weight:500;margin-left:6px}.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:14px}.card{background:var(--wafo-card);border:1px solid rgba(184,138,68,.22);border-radius:18px;padding:14px;text-align:center;box-shadow:0 8px 22px rgba(55,32,13,.05)}.thumb{height:104px;display:flex;align-items:center;justify-content:center}.thumb img{max-width:96px;max-height:96px;display:block;object-fit:contain}.card strong{display:block;font-size:11px;line-height:1.35;color:#6d522e;word-break:break-all}.card code{display:block;margin-top:5px;font-size:10px;color:#a17a44;word-break:break-all}.warn{padding:14px 16px;background:#fff3d8;border:1px solid rgba(184,138,68,.32);border-radius:16px;color:#6c4a1f;line-height:1.7}.hide{display:none}.toplink{position:fixed;right:16px;bottom:16px;background:#37200D;color:#FFF8EC;text-decoration:none;padding:10px 14px;border-radius:999px;font-size:13px;box-shadow:0 8px 22px rgba(55,32,13,.2)}
  </style>
</head>
<body>
  <main class="wrap" id="top">
    <section class="hero">
      <h1>WAFO Design Asset Library Demo</h1>
      <p class="lead">線上預覽用。先看圖案，再回到 manifest 查 asset_id、css_class 與正式路徑。此頁使用 PNG 512 透明圖直接顯示，避免 CSS 路徑或 mask 造成看不到。</p>
      <div class="toolbar" id="filters"></div>
      <div class="status" id="status">Loading manifest...</div>
    </section>
    <section id="app"></section>
  </main>
  <a class="toplink" href="#top">TOP</a>
  <script>
    const manifestUrl = '../manifest/wafo_design_asset_manifest_v2_clean.csv';
    const app = document.getElementById('app');
    const statusEl = document.getElementById('status');
    const filters = document.getElementById('filters');

    function parseCSV(text){
      text = text.replace(/^\uFEFF/, '');
      const rows = [];
      let row = [], cell = '', quote = false;
      for(let i=0;i<text.length;i++){
        const c = text[i], n = text[i+1];
        if(c === '"'){
          if(quote && n === '"'){ cell += '"'; i++; }
          else quote = !quote;
        }else if(c === ',' && !quote){ row.push(cell); cell = ''; }
        else if((c === '\n' || c === '\r') && !quote){
          if(c === '\r' && n === '\n') i++;
          row.push(cell); cell = '';
          if(row.some(v => v !== '')) rows.push(row);
          row = [];
        }else cell += c;
      }
      if(cell || row.length){ row.push(cell); rows.push(row); }
      const head = rows.shift();
      return rows.map(r => Object.fromEntries(head.map((h,i)=>[h,r[i]||''])));
    }

    function catFolder(r){ return `${r.category_id}_${r.category_slug}`; }
    function pngPath(r){ return `../assets/png512/${catFolder(r)}/${r.asset_id}.png`; }
    function svgPath(r){ return `../assets/svg/${catFolder(r)}/${r.asset_id}.svg`; }

    function render(rows, active='all'){
      app.innerHTML = '';
      const grouped = new Map();
      rows.forEach(r => {
        const key = catFolder(r);
        if(active !== 'all' && key !== active) return;
        if(!grouped.has(key)) grouped.set(key, {name:r.category_name, rows:[]});
        grouped.get(key).rows.push(r);
      });
      grouped.forEach((g,key)=>{
        const sec = document.createElement('section');
        sec.className = 'cat';
        sec.innerHTML = `<h2>${key}<small>${g.name} / ${g.rows.length}</small></h2><div class="grid"></div>`;
        const grid = sec.querySelector('.grid');
        g.rows.forEach(r => {
          const card = document.createElement('div');
          card.className = 'card';
          card.innerHTML = `<div class="thumb"><img loading="lazy" src="${pngPath(r)}" alt="${r.asset_id}" onerror="this.onerror=null;this.src='${svgPath(r)}';"></div><strong>${r.asset_id}</strong><code>${r.css_class}</code>`;
          grid.appendChild(card);
        });
        app.appendChild(sec);
      });
    }

    fetch(manifestUrl)
      .then(r => { if(!r.ok) throw new Error('manifest not found'); return r.text(); })
      .then(text => {
        const rows = parseCSV(text);
        const cats = [...new Map(rows.map(r => [catFolder(r), r.category_name])).entries()];
        filters.innerHTML = `<button class="pill" data-cat="all">全部</button>` + cats.map(([key,name])=>`<button class="pill" data-cat="${key}">${key}</button>`).join('');
        filters.addEventListener('click', e => { if(e.target.dataset.cat) render(rows, e.target.dataset.cat); });
        statusEl.textContent = `Loaded ${rows.length} assets. Click category buttons to filter.`;
        render(rows);
      })
      .catch(err => {
        statusEl.innerHTML = '';
        app.innerHTML = `<div class="cat"><div class="warn">Demo could not load manifest. Please check manifest path: ${manifestUrl}<br>${err.message}</div></div>`;
      });
  </script>
</body>
</html>
